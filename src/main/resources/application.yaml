spring:
  application:
    name: Titan

  datasource:
    username: root
    password: root
    url: jdbc:mysql://localhost:3306/titan?createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
